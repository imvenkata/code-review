# GitLab-native deterministic security scanning — the *reliable* control for secrets and known
# vulnerabilities. Pair it with the AI review (ci/ai-review.gitlab-ci.yml) for defense in depth:
# these scanners do detection; the review-mr agent covers logic-level security a scanner can't see.
#
# Add to YOUR .gitlab-ci.yml (order doesn't matter):
#   include:
#     - local: '/ci/security-scanning.gitlab-ci.yml'   # Secret Detection + SAST (this file)
#     - local: '/ci/ai-review.gitlab-ci.yml'           # AI code review
#
# Notes:
#   - The scanning JOBS run on any GitLab tier and write JSON reports as artifacts.
#   - The rich MR security widget + approval gating on findings require GitLab Ultimate.
#   - These templates default their jobs to `stage: test`; ensure your pipeline has a `test` stage
#     (or override `stage:` via the documented SAST/Secret-Detection variables).
#   - Both run on merge request and default-branch pipelines out of the box.

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
