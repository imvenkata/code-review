# Review config (config-as-code, CodeRabbit-style). Read by both review features.
# Lives at .github/review.config.yml; copy + tune per repo. Keep it short.

# Default confidence threshold per strictness level (findings below are dropped).
strictness:
  default: medium        # low (>=90) | medium (>=80) | high (>=70)

# Local-review target. Leave empty to discover the remote default branch, then main/master.
# Set this when your target branch uses another name. REVIEW_BASE_REF and the helper's --base flag
# override this value.
local:
  base_ref: ""

# Patch token budgets, enforced by the collector scripts (KiB). Oversized files are
# reported as `unavailable` so coverage stays honest instead of overflowing context.
limits:
  max_file_patch_kb: 64
  max_total_patch_kb: 512

# Paths excluded from review entirely (token saver + noise reduction).
path_filters:
  ignore:
    - ".github/**"
    - "**/*.md"
    - "**/*.lock"
    - "**/*.min.*"
    - "**/dist/**"
    - "**/build/**"
    - "**/vendor/**"
    - "**/node_modules/**"
    - "**/*.generated.*"
    - "**/__snapshots__/**"
    - "**/package-lock.json"
    - "**/pnpm-lock.yaml"
    - "**/yarn.lock"

# MR posting limits.
review:
  max_inline_comments: 15      # cap inline threads; overflow summarized
  enable_suggestions: true     # add ```suggestion blocks for one-click fixes
  skip_drafts: true            # skip draft / WIP MRs
  skip_bot_authored: true      # loop guard: skip MRs authored by the review bot
  # A complete summary carries a head + requirement + pipeline freshness marker.
  # Partial reviews never suppress retries.

# MR requirement evidence. A missing or ambiguous story makes the review partial.
requirements:
  require_story: true

# Current-head CI and security evidence policy.
# Modes:
#   required - absence, failure, or unreadable evidence blocks a complete decision
#   optional - absence is reported as "Not evaluated"; present evidence is fully validated
#   disabled - do not inspect this control
security:
  pipeline:
    mode: required
  secret_detection:
    mode: optional
    artifact: gl-secret-detection-report.json
  sast:
    mode: optional
    artifact: gl-sast-report.json
  block_severities:
    - critical
    - high

# Model selection remains inside the organization's approved GitHub Copilot surface.
# This toolkit never calls a model API directly.
